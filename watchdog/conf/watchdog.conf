# watchdog.conf - Configuracion del plugin Watchdog para HestiaCP.
# Formato estricto: KEY='VALUE' (una por linea). Las lineas que empiezan por #
# son comentarios. No usar espacios alrededor del signo igual.

# ===========================================================================
# SEGURIDAD - KILL SWITCH (REGLA ANTI-CATASTROFE)
# ===========================================================================
# Con 'true' se cortan TODAS las acciones hacia terceros (email/Telegram/
# webhooks). Los checks siguen ejecutandose y registrando, pero NO se envia
# nada al exterior. Cambiar a 'false' SOLO cuando el operador haya validado
# canales y umbrales. Por defecto 'true' para evitar avisos masivos accidentales.
WD_KILL_SWITCH='true'

# ===========================================================================
# UMBRALES DE MONITORIZACION (porcentajes salvo LOAD)
# ===========================================================================
# Uso de CPU: WARNING al superar el primero, CRITICAL al superar el segundo.
WD_CPU_WARN='80'
WD_CPU_CRIT='95'

# Uso de memoria RAM (% usado).
WD_RAM_WARN='80'
WD_RAM_CRIT='95'

# Uso de disco (% ocupado en particiones monitorizadas).
WD_DISK_WARN='80'
WD_DISK_CRIT='90'

# Carga del sistema relativa al numero de nucleos (load average / nproc).
# 1.0 = un nucleo saturado de media. WARNING y CRITICAL como multiplicadores.
WD_LOAD_WARN='1.5'
WD_LOAD_CRIT='3.0'

# ===========================================================================
# VENTANA ANTI-DUPLICADO
# ===========================================================================
# Minutos minimos entre dos notificaciones de la MISMA condicion. Evita
# inundar canales. 0 desactiva la ventana (no recomendado). 30 por defecto.
WD_NOTIFY_WINDOW='30'

# ===========================================================================
# CANALES DE NOTIFICACION ACTIVOS
# ===========================================================================
# Activan/desactivan el canal. Las credenciales las consume el bloque de
# notificaciones. Mientras WD_KILL_SWITCH='true' NINGUN canal envia.
WD_CHANNEL_EMAIL='false'
WD_CHANNEL_TELEGRAM='false'
WD_CHANNEL_WEBHOOK='false'
WD_CHANNEL_SLACK='false'
WD_CHANNEL_DISCORD='false'

# Destinatario de email (admin del panel). Vacio = sin email.
WD_EMAIL_TO=''
# Remitente (usado por sendmail) y usuario Hestia para v-send-mail.
WD_EMAIL_FROM='watchdog@localhost'
WD_HESTIA_USER='admin'

# Telegram: token del bot y chat id. Vacios = sin Telegram.
WD_TELEGRAM_TOKEN=''
WD_TELEGRAM_CHAT_ID=''

# URL de webhook generico (POST JSON). Vacio = sin webhook.
WD_WEBHOOK_URL=''
# Cabecera Authorization opcional para el webhook (ej. 'Bearer xxx'). NO se loguea.
WD_WEBHOOK_AUTH=''

# Incoming Webhook de Slack (secreto, no se loguea).
WD_SLACK_WEBHOOK=''

# Webhook de Discord (secreto, no se loguea).
WD_DISCORD_WEBHOOK=''

# ===========================================================================
# MOTOR DE ALERTAS (lib/alerts.sh)
# ===========================================================================
# Maximo de notificaciones GLOBALES por hora (proteccion anti-inundacion).
WD_RATE_MAX_HOUR='20'
# Lecturas WARNING consecutivas de la misma metrica antes de escalar a CRITICAL.
WD_ESCALATE_AFTER='3'
# 'true' agrupa todas las alertas de una ejecucion en un unico mensaje digest.
WD_DIGEST='true'
# Reintentos por envio en cada notificador (backoff exponencial 2,4,8...s).
WD_NOTIFY_RETRIES='3'

# ===========================================================================
# DEPURACION Y LOGGING
# ===========================================================================
# 'true' registra mensajes DEBUG en logs/watchdog.log (verboso).
DEBUG='false'

# Tamano maximo del log en bytes antes de rotar (por defecto 2 MB) y numero
# de ficheros rotados a conservar.
WD_LOG_MAX_BYTES='2097152'
WD_LOG_KEEP='5'
