# staging.conf - Configuracion global del plugin Staging para HestiaCP.
# Formato: KEY='VALUE' (una clave por linea). Las lineas con # son comentarios.
# Lectura/escritura via stg_conf_get / stg_conf_set (lib/common.sh).
# Permisos recomendados: chmod 600 (puede contener parametros sensibles).

# ===========================================================================
# SEGURIDAD CRITICA (regla anti-catastrofe)
# ===========================================================================
# Kill switch del push-to-live. 'true' = BLOQUEADO. Mientras este en 'true'
# NINGUNA operacion que sobrescriba produccion se ejecuta. El operador debe
# cambiarlo a 'false' conscientemente, y solo tras verificar backups.
STG_PUSH_KILL_SWITCH='true'

# TTL maximo (segundos) que se considera valido un backup live previo antes de
# autorizar una escritura sobre produccion. 24h por defecto. Un backup mas
# antiguo obliga a regenerarlo (stg_require_backup_done falla).
STG_BACKUP_TTL='86400'

# ===========================================================================
# DEPURACION Y LOGS
# ===========================================================================
# DEBUG='true' habilita el nivel DEBUG en logs/staging.log (trazas de rsync,
# dumps, reemplazos, swaps). Nunca registra contrasenas en claro.
DEBUG='false'

# ===========================================================================
# PATRON DE NOMBRES DE LOS ENTORNOS DE STAGING
# ===========================================================================
# Plantilla del nombre de dominio del staging. {domain} = dominio origen.
# Ejemplos: 'staging.{domain}'  ->  staging.midominio.com
#           '{domain}-stg'      ->  midominio.com-stg (uso con dominio aparte)
STG_NAME_PATTERN='staging.{domain}'

# Modo por defecto de creacion: subdomain | domain | user.
STG_DEFAULT_MODE='subdomain'

# ===========================================================================
# PREFIJOS DE BASES DE DATOS Y USUARIOS
# ===========================================================================
# Prefijo aplicado a las BBDD y usuarios de BBDD del staging para evitar
# colisiones con produccion. HestiaCP antepone ya el usuario del panel, por lo
# que este prefijo debe ser corto (limite de longitud de identificadores MySQL).
STG_DB_PREFIX='stg_'
STG_DBUSER_PREFIX='stg_'

# ===========================================================================
# TTL / CADUCIDAD DE LOS ENTORNOS
# ===========================================================================
# Dias tras los cuales un staging se considera caducado (aviso / borrado opcional
# en el comando de ciclo de vida). 0 = sin caducidad.
STG_TTL_DAYS='30'

# ===========================================================================
# PROTECCION DEL STAGING (no indexar / acceso restringido)
# ===========================================================================
# Anadir cabecera X-Robots-Tag: noindex y robots.txt de bloqueo.
STG_NOINDEX='true'
# Proteger el staging con HTTP Basic Auth por defecto.
STG_BASIC_AUTH='true'
# Usuario por defecto del Basic Auth (la contrasena se genera al crear).
STG_BASIC_AUTH_USER='staging'

# ===========================================================================
# EXCLUSIONES DE RSYNC (clonado de ficheros)
# ===========================================================================
# Patrones separados por '|'. Se traducen a --exclude en el clonado. Evita copiar
# caches, logs y artefactos voluminosos no necesarios en staging.
STG_RSYNC_EXCLUDES='wp-content/cache/|wp-content/uploads/cache/|var/cache/|var/logs/|cache/|storage/logs/|storage/framework/cache/|node_modules/|.git/|*.log|error_log|.DS_Store|tmp/|temp/'

# Excluir el directorio de uploads grandes en sync incremental (--exclude-uploads).
STG_UPLOADS_EXCLUDE='wp-content/uploads/|img/|images/|storage/app/public/'

# ===========================================================================
# CLIENTES Y HERRAMIENTAS
# ===========================================================================
# Ruta a wp-cli (opcional, para search-replace serialize-safe en WordPress).
# Si esta vacio se intenta resolver por PATH; si no existe se usa un reemplazo
# serialize-safe propio (nunca un sed plano sobre el dump).
STG_WPCLI=''

# ===========================================================================
# PLANTILLAS DE REESCRITURA POR CMS (Fase 8)
# ===========================================================================
# Para cada CMS, lista de ficheros de configuracion donde reescribir credenciales
# y la estrategia de reemplazo de URLs en BBDD. Las reglas detalladas se
# implementan en el bloque de reescritura; aqui se documentan los puntos de
# entrada para que el operador pueda revisarlos.
#
# wordpress    -> wp-config.php (DB_NAME/DB_USER/DB_PASSWORD/DB_HOST) +
#                 search-replace serialize-safe de la URL en wp_options y tablas.
# prestashop   -> config/settings.inc.php o app/config/parameters.php +
#                 actualizacion de ps_shop_url / ps_configuration (PS_SHOP_DOMAIN).
# laravel      -> .env (DB_*, APP_URL, MAIL_MAILER=log, QUEUE_CONNECTION=sync).
# joomla       -> configuration.php ($db/$user/$password/$host, $sitename).
# estatico     -> sin BBDD; solo reescritura de rutas/URLs en ficheros de texto.
STG_TPL_WORDPRESS='wp-config.php'
STG_TPL_PRESTASHOP='config/settings.inc.php,app/config/parameters.php'
STG_TPL_LARAVEL='.env'
STG_TPL_JOOMLA='configuration.php'

# Desactivaciones de seguridad forzadas en staging (Fase 8). Documentadas aqui:
#   - WordPress: define('WP_ENVIRONMENT_TYPE','staging'); plugins de pago en test.
#   - Laravel:   MAIL_MAILER=log, QUEUE_CONNECTION=sync, APP_ENV=staging.
#   - PrestaShop: PS_SHOP_ENABLE=0 o modo mantenimiento, pasarelas en sandbox.
STG_DISABLE_EMAILS='true'
STG_DISABLE_PAYMENTS='true'

# Busqueda y reemplazo general de URLs en la BBDD de PrestaShop (ademas del
# cambio puntual en ps_shop_url y PS_SHOP_DOMAIN). 'true' = reemplaza tambien las
# URLs cableadas en cms, modulos y configuracion (serialize-safe, variantes
# https/http// para no tocar emails). 'false' = solo ps_shop_url/PS_SHOP_DOMAIN.
STG_PS_SEARCH_REPLACE='true'
